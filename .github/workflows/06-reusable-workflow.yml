    steps:
      - uses: actions/checkout@v4

      # TODO: [Задание 6] Используйте input java-version для настройки JDK.
      #   Обращение к input: ${{ inputs.java-version }}
      - uses: actions/setup-java@v4
        with:
          java-version: '21'   # TODO: замените на input
          distribution: 'temurin'

      - uses: actions/cache@v4
        with:
          path: ~/.gradle/caches
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle.kts') }}

      # TODO: [Задание 7] Используйте input working-directory.
      - name: Run tests
        working-directory: kotlin-project   # TODO: замените на input
        run: ./gradlew test --no-daemon

